name: Unit tests

on:
  push:
    branches:
      - master
      - android-10
  pull_request:
    branches:
      - master
      - android-10

jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
    - name: Clone repository
      uses: actions/checkout@v6
    - name: Install Determinate Nix
      uses: DeterminateSystems/determinate-nix-action@v3
    - name: Execute tests
      run: nix develop --command ./gradlew test
